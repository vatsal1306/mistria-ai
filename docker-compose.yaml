services:
    backend:
        build:
            context: .
            target: backend
        image: mistria-ai-backend:local
        environment:
            MISTRIA_API_HOST: 0.0.0.0
            MISTRIA_API_PORT: 8080
            MISTRIA_API_RELOAD: "false"
            MISTRIA_INFERENCE_BACKEND: ${MISTRIA_INFERENCE_BACKEND:-mock}
            MISTRIA_AUTH_ENCRYPTION_KEY: ${MISTRIA_AUTH_ENCRYPTION_KEY:-change-me-before-production}
            MISTRIA_API_KEY: ${MISTRIA_API_KEY:-change-me-before-production}
            MISTRIA_STORAGE_SQLITE_PATH: /app/data/db/app.db
        ports:
            - "8080:8080"
        volumes:
            - mistria_data:/app/data
        healthcheck:
            test:
              [
                  "CMD",
                  "python",
                  "scripts/http_probe.py",
                  "--url",
                  "http://127.0.0.1:8080/health",
              ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 10s

    frontend:
        build:
            context: .
            target: frontend
        image: mistria-ai-frontend:local
        depends_on:
            backend:
                condition: service_healthy
        environment:
            MISTRIA_API_HOST: backend
            MISTRIA_API_PORT: 8080
            MISTRIA_INFERENCE_BACKEND: ${MISTRIA_INFERENCE_BACKEND:-mock}
            MISTRIA_AUTH_ENCRYPTION_KEY: ${MISTRIA_AUTH_ENCRYPTION_KEY:-change-me-before-production}
            MISTRIA_API_KEY: ${MISTRIA_API_KEY:-change-me-before-production}
            MISTRIA_STORAGE_SQLITE_PATH: /app/data/db/app.db
        ports:
            - "8501:8501"
        volumes:
            - mistria_data:/app/data
        healthcheck:
            test:
              [
                  "CMD",
                  "python",
                  "scripts/http_probe.py",
                  "--url",
                  "http://127.0.0.1:8501/",
                  "--expected-status",
                  "200",
              ]
            interval: 10s
            timeout: 5s
            retries: 18
            start_period: 20s

volumes:
    mistria_data:
