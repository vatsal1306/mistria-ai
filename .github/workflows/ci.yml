name: CI

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    PYTHON_VERSION: "3.10"
    UV_VERSION: "0.9.18"
    MISTRIA_AUTH_ENCRYPTION_KEY: ci-auth-encryption-key
    MISTRIA_API_KEY: ci-api-key

jobs:
    python-checks:
        name: Python Checks
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6.0.2

            -   name: Set up Python
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: ${{ env.PYTHON_VERSION }}

            -   name: Set up uv
                uses: astral-sh/setup-uv@v8.0.0
                with:
                    enable-cache: true
                    version: ${{ env.UV_VERSION }}

            -   name: Install application dependencies
                run: uv sync --frozen --no-dev --no-install-project

            -   name: Validate Python bytecode compilation
                run: uv run python -m compileall main.py streamlit_app.py src scripts

    security:
        name: Security Checks
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6.0.2

            -   name: Set up Python
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: ${{ env.PYTHON_VERSION }}

            -   name: Set up uv
                uses: astral-sh/setup-uv@v8.0.0
                with:
                    enable-cache: true
                    version: ${{ env.UV_VERSION }}

            -   name: Install application dependencies
                run: uv sync --frozen --no-dev --no-install-project

            -   name: Run Bandit on source directories
                run: uvx --from bandit bandit -q -r src scripts

            -   name: Run Bandit on entrypoints
                run: uvx --from bandit bandit -q main.py streamlit_app.py

            -   name: Install dependency audit tool
                run: uv pip install --python .venv/bin/python pip-audit

            -   name: Audit dependencies
                run: .venv/bin/pip-audit

    compose-smoke:
        name: Compose Smoke Test
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6.0.2

            -   name: Set up Python
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: ${{ env.PYTHON_VERSION }}

            -   name: Set up uv
                uses: astral-sh/setup-uv@v8.0.0
                with:
                    enable-cache: true
                    version: ${{ env.UV_VERSION }}

            -   name: Install application dependencies
                run: uv sync --frozen --no-dev --no-install-project

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4.0.0

            -   name: Build compose images
                run: docker compose --env-file .env.example build --pull

            -   name: Start compose stack
                run: docker compose --env-file .env.example up -d

            -   name: Run end-to-end smoke checks
                run: >
                    uv run python scripts/smoke_stack.py
                    --frontend-url http://127.0.0.1:8501/
                    --backend-health-url http://127.0.0.1:8080/health
                    --websocket-url ws://127.0.0.1:8080/ws/chat

            -   name: Show compose status on failure
                if: failure()
                run: docker compose ps

            -   name: Show compose logs on failure
                if: failure()
                run: docker compose logs --no-color

            -   name: Stop compose stack
                if: always()
                run: docker compose --env-file .env.example down -v --remove-orphans

    sync-wiki:
        name: Sync API doc to Wiki
        runs-on: ubuntu-latest
        # ONLY run this when pushing to main, preventing PRs from overwriting the wiki
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
            WIKI_SOURCE_FILE: docs/API Documentation.md
            WIKI_TARGET_FILE: API Documentation.md

        steps:
            -   name: Checkout Main Repo
                uses: actions/checkout@v6.0.2
                with:
                    path: main-repo

            -   name: Checkout Wiki Repo
                uses: actions/checkout@v6.0.2
                with:
                    repository: ${{ github.repository }}.wiki
                    path: wiki-repo
                    token: ${{ secrets.WIKI_SYNC_PAT }}

            -   name: Validate source doc exists
                run: test -f "main-repo/${WIKI_SOURCE_FILE}"

            -   name: Copy and Push to Wiki
                run: |
                    cp "main-repo/${WIKI_SOURCE_FILE}" "wiki-repo/${WIKI_TARGET_FILE}"

                    cd wiki-repo
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add "${WIKI_TARGET_FILE}"

                    if git diff --cached --quiet; then
                        echo "No wiki changes to commit."
                        exit 0
                    fi

                    git commit -m "Auto-sync from main repo CI"
                    git push
