<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistria Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    background: linear-gradient(135deg, #e879a8, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .connection-badge {
    background: #1e1e3a;
    border: 1px solid #3a3a6a;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.8rem;
    color: #c0c0e0;
  }

  .connection-value { font-weight: 700; color: #e879a8; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ef4444; display: inline-block;
  }
  .status-dot.connected { background: #22c55e; }

  #reset-btn, #set-eng-btn {
    border-radius: 20px; padding: 6px 14px;
    font-size: 0.8rem; cursor: pointer; transition: background 0.2s;
  }
  #reset-btn {
    background: #2a1a1a; border: 1px solid #5a2a2a; color: #f87171;
  }
  #reset-btn:hover { background: #3a1a1a; }
  #set-eng-btn {
    background: #1a1a2e; border: 1px solid #3a3a6a; color: #a5b4fc;
  }
  #set-eng-btn:hover { background: #2a2a4e; }

  #eng-input {
    width: 48px; padding: 5px 8px; background: #0f0f1a;
    border: 1px solid #3a3a6a; border-radius: 10px;
    color: #e0e0e0; font-size: 0.8rem; text-align: center; outline: none;
  }
  #eng-input:focus { border-color: #a855f7; }

  #login-screen {
    flex: 1; display: flex; align-items: center; justify-content: center;
  }

  .login-card {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 16px; padding: 40px; text-align: center; width: 340px;
  }
  .login-card h2 { font-size: 1.4rem; margin-bottom: 8px; color: #e0e0e0; }
  .login-card p { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 12px 16px; background: #0f0f1a;
    border: 1px solid #2a2a4a; border-radius: 10px;
    color: #e0e0e0; font-size: 0.95rem; outline: none;
    margin-bottom: 16px; transition: border-color 0.2s;
  }
  .login-card input:focus { border-color: #a855f7; }
  .login-card button {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #a855f7, #e879a8);
    border: none; border-radius: 10px; color: #fff;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  .login-card button:hover { opacity: 0.9; }

  #chat-screen { flex: 1; display: none; flex-direction: column; }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

  .msg {
    max-width: 75%; padding: 12px 16px; border-radius: 16px;
    line-height: 1.5; font-size: 0.93rem;
    word-wrap: break-word; white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff; border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start; background: #1a1a2e;
    border: 1px solid #2a2a4a; color: #d0d0e8;
    border-bottom-left-radius: 4px;
  }
  .msg .meta {
    font-size: 0.72rem; color: #888; margin-top: 6px; text-align: right;
  }
  .msg.assistant .meta { text-align: left; }

  .typing-indicator {
    align-self: flex-start; padding: 12px 20px;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 16px; display: none;
  }
  .typing-indicator span {
    display: inline-block; width: 8px; height: 8px;
    background: #a855f7; border-radius: 50%; margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #input-bar {
    padding: 16px 24px; background: #141420;
    border-top: 1px solid #2a2a4a; display: flex; gap: 12px; flex-shrink: 0;
  }
  #msg-input {
    flex: 1; padding: 12px 18px; background: #0f0f1a;
    border: 1px solid #2a2a4a; border-radius: 24px;
    color: #e0e0e0; font-size: 0.95rem; outline: none;
  }
  #msg-input:focus { border-color: #a855f7; }
  #send-btn {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #a855f7, #e879a8);
    border: none; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 20px; height: 20px; fill: #fff; }

  .error-toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5;
    padding: 10px 20px; border-radius: 10px; font-size: 0.85rem;
    z-index: 100; animation: fadeout 3s forwards;
  }
  @keyframes fadeout { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <h1>Mistria</h1>
  <div class="header-right" id="header-right" style="display:none;">
    <span class="status-dot" id="status-dot"></span>
    <div class="connection-badge">
      Connection <span class="connection-value" id="conn-val">--</span>%
    </div>
    <button id="reset-btn" onclick="resetSession()">Reset</button>
    <input type="text" id="eng-input" placeholder="0-100">
    <button id="set-eng-btn" onclick="setEngagement()">Set</button>
  </div>
</header>

<div id="login-screen">
  <div class="login-card">
    <h2>Welcome</h2>
    <p>Enter your user ID to start chatting</p>
    <input type="text" id="user-id-input" placeholder="e.g. user_101" value="user_101" autofocus>
    <button onclick="startChat()">Start Chat</button>
  </div>
</div>

<div id="chat-screen">
  <div id="messages">
    <div class="typing-indicator" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="input-bar">
    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  let userId = '';
  let ws = null;
  let activeReplyEl = null;
  let isStreaming = false;
  let messages = [];

  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const connVal = document.getElementById('conn-val');
  const statusDot = document.getElementById('status-dot');

  function connectWebSocket() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

    ws.onopen = () => console.log('WebSocket connected');

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'ready') {
        statusDot.classList.add('connected');
      } else if (data.type === 'start') {
        // request acknowledged
      } else if (data.type === 'delta') {
        typingEl.style.display = 'none';
        if (!activeReplyEl) {
          activeReplyEl = document.createElement('div');
          activeReplyEl.className = 'msg assistant';
          messagesEl.insertBefore(activeReplyEl, typingEl);
        }
        activeReplyEl.textContent += data.delta;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else if (data.type === 'done') {
        if (data.connection != null) connVal.textContent = data.connection;
        if (activeReplyEl) {
          const m = document.createElement('div');
          m.className = 'meta';
          m.textContent = data.latency_seconds != null ? data.latency_seconds.toFixed(1) + 's' : '';
          activeReplyEl.appendChild(m);
        }
        if (data.text) messages.push({role: 'assistant', content: data.text});
        activeReplyEl = null;
        isStreaming = false;
        sendBtn.disabled = false;
        msgInput.disabled = false;
        msgInput.focus();
      } else if (data.type === 'error') {
        showError(data.detail || 'Unknown error');
        activeReplyEl = null;
        isStreaming = false;
        typingEl.style.display = 'none';
        sendBtn.disabled = false;
        msgInput.disabled = false;
      }
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      setTimeout(connectWebSocket, 2000);
    };
    ws.onerror = () => ws.close();
  }

  function startChat() {
    const input = document.getElementById('user-id-input').value.trim();
    if (!input) return;
    userId = input;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('header-right').style.display = 'flex';
    connectWebSocket();
    msgInput.focus();
  }

  document.getElementById('user-id-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startChat();
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMsg(role, text, meta) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      div.appendChild(m);
    }
    messagesEl.insertBefore(div, typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showError(msg) {
    const el = document.createElement('div');
    el.className = 'error-toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }

  async function resetSession() {
    if (!userId) return;
    try {
      const res = await fetch('/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId }),
      });
      if (!res.ok) throw new Error('Reset failed');
      const data = await res.json();
      connVal.textContent = data.connection;
      messagesEl.querySelectorAll('.msg').forEach(m => m.remove());
      messages = [];
    } catch (err) { showError(err.message); }
  }

  async function setEngagement() {
    if (!userId) return;
    const val = parseInt(document.getElementById('eng-input').value, 10);
    if (isNaN(val) || val < 0 || val > 100) {
      showError('Enter a value between 0 and 100');
      return;
    }
    try {
      const res = await fetch('/set-engagement', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, score: val }),
      });
      if (!res.ok) throw new Error('Set engagement failed');
      const data = await res.json();
      connVal.textContent = data.connection;
      document.getElementById('eng-input').value = '';
    } catch (err) { showError(err.message); }
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isStreaming) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showError('WebSocket not connected. Reconnecting...');
      connectWebSocket();
      return;
    }
    msgInput.value = '';
    appendMsg('user', text);
    messages.push({role: 'user', content: text});
    sendBtn.disabled = true;
    msgInput.disabled = true;
    isStreaming = true;
    typingEl.style.display = 'block';
    messagesEl.scrollTop = messagesEl.scrollHeight;

    ws.send(JSON.stringify({
      action: 'chat',
      user_id: userId,
      messages: messages,
      resume_pulse: true
    }));
  }
</script>
</body>
</html>
